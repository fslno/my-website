<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | FSLNO Sport</title>
    <style>
        :root {
            --primary: #000000;
            --secondary: #8a8a8a;
            --bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }
        p {
            font-size: 14px;
            color: var(--secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: #fff;
            padding: 15px 40px;
            text-decoration: none;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .logo {
            font-weight: 900;
            font-size: 32px;
            margin-bottom: 40px;
            letter-spacing: -0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">FSLNO</div>
        <h1>You're Offline</h1>
        <p>It seems you've lost your connection. Don't worry, you can still browse your saved items and cart when you're back online.</p>
        <a href="/" class="btn">Try Again</a>
    </div>
    <script>
        // Check for connection periodically and reload
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
